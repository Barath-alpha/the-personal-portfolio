<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Barath M | AI & Data Science Portfolio{% endblock %}</title>
  <meta name="description"
    content="{% block description %}Barath M - AI & Data Science student portfolio showcasing projects, skills, and achievements.{% endblock %}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/' + page_css + '.css') }}" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>

<body>
  <!-- Neural Network Canvas -->
  <canvas id="neural-canvas"></canvas>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="/" class="nav-logo">BM</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/skills">Skills</a></li>
      <li><a href="/projects">Projects</a></li>
      <li><a href="/certifications">Certs</a></li>
      <li><a href="/experience">Experience</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="page-content">
    {% block content %}{% endblock %}
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-socials">
      <a href="https://github.com/Barath-alpha" target="_blank" title="GitHub">GitHub</a>
      <span class="separator">|</span>
      <a href="https://www.linkedin.com/in/barath-mohankumar/" target="_blank" title="LinkedIn">LinkedIn</a>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>

</html>
